<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente</title>

    <link rel="stylesheet" href="/static/style.css">
    
    <script src="/static/app.js"></script>
</head>

<body>

<div class="sidebar">
    <div style="text-align: center; padding: 20px 0;">
        <img src="/static/logo.png" class="logo-img" style="width: 80px;">
        <h2 style="font-size: 1.2rem; color: #fff;">Cadastro de Cliente</h2>
    </div>
    <hr style="opacity: 0.1; margin: 10px 20px;">
    <a href="/static/dashboard.html">🏠 Dashboard</a>
    <a href="/static/cadastro_imovel.html">➕ Imóvel</a>
    <a href="/static/buscar_imoveis.html">🔎 Buscar</a>
    <a href="/static/cadastro_cliente.html" class="active">👤 Cadastrar Cliente</a>
    <a href="/static/lista_clientes.html">📋 Clientes</a>
    <a href="/static/mapa_imoveis.html">📍 Mapa de Imóveis</a>
    <a href="/static/login.html">🚪 Sair</a>
</div>

<div class="main">

    <div class="card">
        <h2>Cadastrar Novo Cliente</h2>
        <p>Preencha os dados do interessado para salvar no sistema.</p>

        <label for="nome">Nome Completo</label>
        <input id="nome" placeholder="Ex: João Silva">

        <label for="telefone">Telefone / WhatsApp</label>
        <input id="telefone" placeholder="Ex: (34) 99999-9999">

        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="Ex: joao@email.com">

        <button onclick="cadastrarCliente()">Salvar Cliente</button>
    </div>
<!-- Final do main div -->
    </div> 

    <script>
        document.getElementById('telefone').addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });
    </script>
</body>
</html>

</div>

</body>
</html>
